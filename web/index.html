<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ayò Ọlọ́pọ́n</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="masthead">
        <h1>Ayò Ọlọ́pọ́n</h1>
        <p class="subtitle">A Yoruba mancala game</p>
      </header>

      <section class="controls" aria-label="Game mode">
        <div class="mode-group" role="group" aria-label="Choose mode">
          <button type="button" class="mode-btn is-active" data-mode="pvp">
            2 Players
          </button>
          <button type="button" class="mode-btn" data-mode="cpu">vs CPU</button>
        </div>
        <label class="difficulty" id="difficulty-label">
          CPU
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <div class="action-group">
          <button type="button" class="new-game-btn is-hidden" id="hint">
            Hint
          </button>
          <button
            type="button"
            class="icon-btn"
            id="mute"
            aria-label="Toggle sound"
            aria-pressed="false"
            title="Toggle sound"
          >
            🔊
          </button>
          <button type="button" class="new-game-btn" id="undo" disabled>
            Undo
          </button>
          <button type="button" class="new-game-btn" id="new-game">New game</button>
        </div>
      </section>

      <div class="scoreboard">
        <div class="score" id="score-north">
          <span class="score-label">North <span class="streak" id="streak-north"></span></span>
          <span class="score-value" id="score-value-north">0</span>
        </div>
        <div class="turn" id="turn-indicator">South to move</div>
        <div class="score" id="score-south">
          <span class="score-label">South <span class="streak" id="streak-south"></span></span>
          <span class="score-value" id="score-value-south">0</span>
        </div>
      </div>

      <section class="board" id="board" aria-label="Ayo board">
        <div class="row row-north" id="row-north"></div>
        <div class="row row-south" id="row-south"></div>
      </section>

      <p class="status" id="status"></p>
    </main>

    <div class="toast-host" id="toast-host" aria-live="polite"></div>

    <div class="banner-overlay" id="banner" hidden>
      <div class="banner">
        <h2 class="banner-title" id="banner-title"></h2>
        <p class="banner-detail" id="banner-detail"></p>
        <button type="button" class="new-game-btn" id="banner-new-game">
          New game
        </button>
      </div>
    </div>

    <div class="banner-overlay" id="resume" hidden>
      <div class="banner">
        <h2 class="banner-title">Game in progress</h2>
        <p class="banner-detail" id="resume-detail"></p>
        <div class="banner-actions">
          <button type="button" class="new-game-btn" id="resume-yes">
            Resume game
          </button>
          <button type="button" class="new-game-btn" id="resume-no">
            Start new
          </button>
        </div>
      </div>
    </div>

    <div class="banner-overlay" id="ota-banner" hidden>
      <div class="banner ota-banner">
        <div class="crown">👑</div>
        <h2 class="banner-title" id="ota-title">Ota Champion!</h2>
        <p class="banner-detail" id="ota-detail"></p>
        <button type="button" class="new-game-btn" id="ota-restart">
          Start new series
        </button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
